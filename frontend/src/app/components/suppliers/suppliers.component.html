<div class="page-container">
  <div class="page-header">
    <h1 class="page-title">
      <mat-icon>store</mat-icon>
      Fornecedores
    </h1>
    <button mat-raised-button color="primary" (click)="openForm()">
      <mat-icon>add</mat-icon>
      Novo Fornecedor
    </button>
  </div>

  @if (loading) {
    <mat-progress-bar mode="indeterminate"></mat-progress-bar>
  }

  <mat-card>
    <mat-card-content>
      @if (suppliers.length === 0 && !loading) {
        <div class="empty-state">
          <mat-icon>store</mat-icon>
          <p>Nenhum fornecedor cadastrado ainda.</p>
          <button mat-stroked-button color="primary" (click)="openForm()">Cadastrar Fornecedor</button>
        </div>
      } @else {
        <table mat-table [dataSource]="suppliers" class="full-width mat-elevation-z0">
          <ng-container matColumnDef="name">
            <th mat-header-cell *matHeaderCellDef>Nome</th>
            <td mat-cell *matCellDef="let s"><strong>{{ s.name }}</strong></td>
          </ng-container>
          <ng-container matColumnDef="cnpjCpf">
            <th mat-header-cell *matHeaderCellDef>CNPJ/CPF</th>
            <td mat-cell *matCellDef="let s">{{ s.cnpjCpf || '—' }}</td>
          </ng-container>
          <ng-container matColumnDef="contact">
            <th mat-header-cell *matHeaderCellDef>Contato</th>
            <td mat-cell *matCellDef="let s">{{ s.contact || '—' }}</td>
          </ng-container>
          <ng-container matColumnDef="productCategory">
            <th mat-header-cell *matHeaderCellDef>Categoria</th>
            <td mat-cell *matCellDef="let s">{{ s.productCategory || '—' }}</td>
          </ng-container>
          <ng-container matColumnDef="productCount">
            <th mat-header-cell *matHeaderCellDef>Produtos</th>
            <td mat-cell *matCellDef="let s">{{ s.productCount }}</td>
          </ng-container>
          <ng-container matColumnDef="actions">
            <th mat-header-cell *matHeaderCellDef>Ações</th>
            <td mat-cell *matCellDef="let s">
              <button mat-icon-button color="primary" (click)="openForm(s)" matTooltip="Editar">
                <mat-icon>edit</mat-icon>
              </button>
              <button mat-icon-button color="warn" (click)="delete(s)" matTooltip="Excluir">
                <mat-icon>delete</mat-icon>
              </button>
            </td>
          </ng-container>
          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns;" class="table-row"></tr>
        </table>
      }
    </mat-card-content>
  </mat-card>
</div>
